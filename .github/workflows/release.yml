name: release

# Cut a release by pushing a semver tag, e.g.:
#   git tag v0.2.1 && git push origin v0.2.1
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release + upload archives/checksums
  # packages: write # uncomment when the ghcr Docker target is enabled

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history + tags for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}  # uncomment with the brews: block
